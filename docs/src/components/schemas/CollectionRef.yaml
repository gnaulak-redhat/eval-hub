type: object
description: Collection Reference
required:
  - id
properties:
  id:
    type: string
    description: Unique identifier
  benchmarks:
    type: array
    items:
      $ref: ./BenchmarkConfig.yaml
    description: The benchmarks supported by this collection. If a benchmark is specified
      but is not supported by the collection, the evaluation job will fail. This is needed
      in order to allow overriding the collection benchmarks for a specific evaluation job.
