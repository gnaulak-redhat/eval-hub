name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: make install-deps

    - name: Format check
      run: |
        make fmt
        git diff --exit-code -- '*.go' || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

    - name: Run linter
      run: make lint

    - name: Run vet
      run: make vet

    - name: Run all tests (unit and integration) with coverage
      run: |
        make clean build test-all-coverage

    - name: Upload coverage reports to Codecov
      continue-on-error: ${{ github.actor == 'dependabot[bot]' }}  # Don't fail CI on Dependabot PRs since they can't access secrets
      uses: codecov/codecov-action@v5
      with:
        files: ./bin/coverage.out,./bin/coverage-fvt.out,./bin/coverage-init.out
        disable_search: true
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build and verify the API documentation
      run: |
        npm ci
        make documentation
        git diff --exit-code || (echo "API documentation is not generated. Run 'make documentation' locally." && exit 1)

  security-scan:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"

    - name: Run Gosec Security Scanner
      uses: securego/gosec@v2.19.0
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload SARIF file to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: gosec-results.sarif
        category: "gosec-security-scan"

    - name: Upload Gosec results as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gosec-results
        path: gosec-results.sarif

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'push'

    env:
      IMAGE_REGISTRY: quay.io
      IMAGE_REPOSITORY: evalhub/evalhub

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Quay.io
      uses: docker/login-action@v3
      with:
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        # Branch push: <branch>-<sha>, <branch>
        # Tag push (v1.2.3): 1.2.3, 1.2, latest
        tags: |
          type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=${{ github.ref_name }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Containerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          ${{ steps.meta.outputs.labels }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'quay.expires-after=12w' || '' }}

    - name: Dry-run Docker image
      run: |
        docker run --rm ${{ steps.meta.outputs.tags }} /app/eval-hub --help
