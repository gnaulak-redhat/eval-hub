name: Wheel Validation

on:
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Go binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: bin/eval-hub-linux-amd64
          - goos: darwin
            goarch: arm64
            output: bin/eval-hub-darwin-arm64
          - goos: windows
            goarch: amd64
            output: bin/eval-hub-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Build binary
        run: make cross-compile CROSS_GOOS=${{ matrix.goos }} CROSS_GOARCH=${{ matrix.goarch }}

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.output }}
          retention-days: 1

  build-wheels:
    name: Build wheel (${{ matrix.platform }}-${{ matrix.arch }})
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: manylinux
            arch: x86_64
            binary-artifact: binary-linux-amd64
            binary-name: eval-hub-linux-amd64
            wheel-tag: manylinux_2_17_x86_64
          - platform: macosx
            arch: arm64
            binary-artifact: binary-darwin-arm64
            binary-name: eval-hub-darwin-arm64
            wheel-tag: macosx_11_0_arm64
          - platform: win
            arch: amd64
            binary-artifact: binary-windows-amd64
            binary-name: eval-hub-windows-amd64
            wheel-tag: win_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"

      - name: Install wheel tools
        run: make install-wheel-tools

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.binary-artifact }}
          path: python-server/evalhub_server/binaries/

      - name: Build wheel
        run: make build-wheel WHEEL_PLATFORM=${{ matrix.wheel-tag }} WHEEL_BINARY=${{ matrix.binary-name }}

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheel-${{ matrix.platform }}-${{ matrix.arch }}
          path: python-server/dist/*.whl
          retention-days: 1

  validate-wheels:
    name: Validate wheel (${{ matrix.os }})
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wheel-artifact: wheel-manylinux-x86_64
          - os: macos-latest
            wheel-artifact: wheel-macosx-arm64
          - os: windows-latest
            wheel-artifact: wheel-win-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout VERSION file
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: VERSION

      - name: Set up uv python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"

      - name: Download wheel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.wheel-artifact }}
          path: dist/

      - name: Install wheel
        shell: bash
        run: uv pip install --system dist/*.whl

      - name: Validate --version
        shell: bash
        run: |
          EXPECTED=$(tr -d '\n' < VERSION)
          ACTUAL=$(eval-hub-server --version)
          echo "Expected: eval-hub-server ${EXPECTED}"
          echo "Actual:   ${ACTUAL}"
          echo "${ACTUAL}" | grep -qF "${EXPECTED}"
